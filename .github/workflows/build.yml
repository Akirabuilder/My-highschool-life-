name: Build Ren'Py APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Ren'Py
        run: |
          wget -q https://www.renpy.org/dl/8.3.7/renpy-8.3.7-sdk.tar.bz2
          tar -xjf renpy-8.3.7-sdk.tar.bz2

      - name: Build Android APK
        run: |
          cd renpy-8.3.7-sdk
          ./renpy.sh launcher android_build ../ --destination ../output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: 'output/**/*.apk'
