name: Build Ren'Py APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Ren'Py
        run: |
          wget -q https://www.renpy.org/dl/8.3.7/renpy-8.3.7-sdk.tar.bz2
          tar -xjf renpy-8.3.7-sdk.tar.bz2
          cd renpy-8.3.7-sdk
          ./renpy.sh setup android --quiet

      - name: Build APK
        run: |
          cd renpy-8.3.7-sdk
          ./renpy.sh android_build ../ --destination ../output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: 'output/**/*.apk'
